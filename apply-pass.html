<html lang="en">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/form.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-white">

<div class="container">

<a class="navbar-brand" href="index.html">Chennai Bus Pass</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">
<a class="nav-link" href="history.html">History</a>
</li>

</ul>

</div>

</nav>

<section class="container mt-5">

<div class="form-card">

<h2 class="mb-4">Bus Pass Application</h2>

<form id="passForm">

<div class="row">

<div class="col-md-6">

<label>Name</label>
<input type="text" id="name" class="form-control" required>

</div>

<div class="col-md-6">

<label>Email</label>
<input type="email" id="email" class="form-control" required>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Phone</label>
<input type="tel" id="phone" class="form-control" required>

</div>

<div class="col-md-6">

<label>Student ID</label>
<input type="text" id="studentId" class="form-control">

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Pass Type</label>

<select id="passType" class="form-select">

<option>Student</option>
<option>Regular</option>
<option>Senior Citizen</option>

</select>

</div>

<div class="col-md-6">

<label>Bus Type</label>

<select id="busType" class="form-select">

<option value="ordinary">Ordinary</option>
<option value="express">Express</option>
<option value="deluxe">Deluxe</option>

</select>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Duration</label>

<select id="duration" class="form-select">

<option value="1">1 Month</option>
<option value="3">3 Months</option>
<option value="6">6 Months</option>

</select>

</div>

<div class="col-md-6">

<label>Upload Photo</label>

<input type="file" class="form-control" id="photo">

</div>

</div>

<div class="mt-4">

<h4>Total Fare: ₹ <span id="fare">0</span></h4>

</div>

<button class="btn btn-primary mt-3">

Submit Application

</button>

</form>

</div>

</section>

<script src="js/apply-pass.js"></script>

</body>

</html>
